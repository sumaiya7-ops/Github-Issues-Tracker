<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New - Issues Tracker</title>
    <script src="https://tailwindcss.com"></script>
<!--t+d-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<!--font awesome-->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>  
       
       .active-tab { background-color: #9333ea !important; color: white !important; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-white border-b px-8 py-4 flex flex-wrap justify-between items-center sticky top-0 z-10">
       <div class="flex justify-center items-center gap-4">
        <img src="B13-A5-Github-Issue-Tracker/assets/github-logo.png" class="w-16 sm:w-20 mx-auto sm:mx-0" >
        <h2 class="text-2xl font-bold text-gray-800">Github Issues Tracker</h2>
        </div>
        <div class="sm:pl-80 ">
        <div class="flex flex-col sm:flex-row gap-2   pt-10 sm:pb-10 relative w-full max-w-md  " id="searchBox">
            <div class="relative w-full ">
          <input type="text" id="searchInput" placeholder="Search issues..." class="w-full sm:flex-1 border rounded-lg px-4 py-2  pl-10 pr-4 outline-none focus:ring-2 focus:ring-purple-400">
          
            </div>
            <button  class="bg-purple-600 w-full   text-white px-4 py-2   rounded-lg">+ New Issue</button>
        </div>
        </div>
    </nav>
    <!--card-->
    <main class="max-w-7xl mx-auto p-4 md:p-8">      
        <div class="flex gap-2 mb-6 flex-wrap" id="tabContainer">
            <button onclick="filterIssues('all', this)" id="all-btn" class=" bg-white border px-6 py-2 rounded-lg font-medium shadow-sm">All</button>
            <button onclick="filterIssues('open', this)" class="bg-white border px-6 py-2 rounded-lg font-medium shadow-sm">Open</button>
            <button onclick="filterIssues('closed', this)" class="bg-white border px-6 py-2 rounded-lg font-medium shadow-sm">Closed</button>
        </div>     
        <div class="bg-white p-6 rounded-t-xl border border-b-0 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-2xl bg-indigo-100 p-2 rounded-full" ><img src="B13-A5-Github-Issue-Tracker/assets/Aperture.png"></span>
                <div>
                    <h3 class="font-bold text-lg"><span id="count">0</span> Issues</h3>
                    <p class="text-xs text-gray-500 font-normal ">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-4 text-xs font-bold uppercase tracking-wider">
                <span class="flex items-center gap-1"><span class="w-3 h-3 bg-green-500 rounded-full"></span> Open</span>
                <span class="flex items-center gap-1"><span class="w-3 h-3 bg-purple-600 rounded-full"></span> Closed</span>
            </div>
        </div>
        <div id="spinner" class="text-center py-20 hidden">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-purple-600 mx-auto"></div>
            <p class="mt-4 text-gray-500">Loading issues...</p>
        </div>
        <div id="issue-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 p-6 bg-white border rounded-b-xl min-h-[400px]">
          </div>

     <dialog id="issue_modal" class="modal modal-middle overflow-hidden">
    <div class="modal-box max-w-2xl bg-white shadow-2xl border border-gray-200">
    <div class="flex justify-between items-start mb-5">
      <h3 id="m-title" class="text-2xl font-extrabold text-[#1E1E1E]">Issue Details</h3>
     <button class="btn btn-sm btn-circle btn-ghost" onclick="document.getElementById('issue_modal').close()">✕</button>
    </div>
    <div class="flex items-center gap-2 mb-5">
      <span id="m-status" class="bg-[#00A96E] text-white px-3 py-1 rounded-full text-[10px] font-bold uppercase">Opened</span>
      <p class="text-gray-400 text-xs">• Opened by <span id="m-author" class="font-semibold text-gray-700"></span> • <span id="m-date"></span></p>
    </div>
    <div id="m-labels" class="flex flex-wrap gap-2 mb-4"></div>
    <div >
      <p id="m-desc" class="text-gray-600 text-sm leading-relaxed pb-4"></p>
    </div>
    <div class="grid grid-cols-2 gap-4 bg-gray-50 p-4   mb-6">
      <div>
        <p class="text-xs text-gray-400 uppercase font-bold mb-2">Assignee</p>
        <span id="m-assignee" class="font-bold text-gray-800"></span>
      </div>
      <div class="text-right">
        <p class="text-xs text-gray-400 uppercase font-bold mb-2">Priority</p>
        <span id="m-priority" class="px-4 py-1 rounded-full text-xs font-black text-white uppercase shadow-sm"></span>
      </div>
    </div>
  <div class="modal-action mt-6 pt-4">
      <form method="dialog " >
        <button class="btn bg-[#4A00FF] hover:bg-[#3A00CC] text-white border-none px-8">
          Close
        </button>
      </form>
  </div>
  </div>
</dialog>
    </main>
    
<!--js-->
    <script src="git.js"></script>
</body>
</html>
