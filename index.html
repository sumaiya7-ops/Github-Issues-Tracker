<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GitHub Issues Tracker</title>
 <!--tailwind-->
    <script src="https://tailwindcss.com"></script>

    <!--tailwind + daisy-->
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>



</head>
<body class="bg-[#F6F8FA] flex items-center justify-center h-screen font-sans">
 <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm text-center border">
        <img src="B13-A5-Github-Issue-Tracker/assets/github-logo.png" class="w-16 mx-auto mb-4" alt="Logo">
        <h1 class="text-2xl font-bold text-gray-800">GitHub Issues Tracker</h1>
        <p class="text-gray-500 text-sm mb-6">Sign in to manage your issues efficiently</p>

        <div class="text-left">
            <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
            <input type="text" id="username" placeholder="Enter username"  class="w-full border rounded-lg p-2.5 mb-4 focus:ring-2 focus:ring-purple-500 outline-none">
            
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" id="password" placeholder="Enter Password" class="w-full border rounded-lg p-2.5 mb-6 focus:ring-2 focus:ring-purple-500 outline-none">
            
            <button onclick="login()" class="w-full bg-purple-600 text-white font-bold py-3 rounded-lg hover:bg-purple-700 transition">Sign In</button>
        </div>
        <div class="mt-6 p-3 bg-purple-50 border border-purple-100 rounded-lg text-xs text-purple-700">
            <strong>Demo Admin:</strong> admin | <strong>Pass:</strong> admin123
        </div>
    </div>

    <script>
        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if(user === "admin" && pass === "admin123") {
                localStorage.setItem("isLoggedIn", "true");
                window.location.href = "New.html";
            } else {
                alert("ভুল ইউজারনেম বা পাসওয়ার্ড! ব্যবহার করেছেন।");
            }
        }
    </script>

   
    
</body>
</html>
